<!DOCTYPE html>
<html>
<head>
  <title>Math Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="side-controls" aria-label="Quiz controls">
    <button id="pause" class="side-button" type="button">Pause</button>
    <button id="give-up" class="side-button danger-button" type="button">Give Up</button>
  </div>

  <main class="app">
    <h1>Math Practice</h1>

    <p id="timer">Time: 10m 0s</p>
    <p id="score">Score: 0</p>

    <button id="start" class="start-button" type="button">Start Quiz</button>

    <div id="quiz-area">
      <h2 id="question"></h2>

      <div id="answer-area" class="answer-area" aria-label="Answer area"></div>
      <button id="submit" type="button">Submit</button>
    </div>

    <p id="feedback"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
